<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EPKP Wind</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root { --bg:#fafaf8; --card:#fff; --text:#111; --muted:#888; --border:#e2e2e0; --font:'Inter',system-ui,sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

  .header{padding:12px 16px 8px;border-bottom:1px solid var(--border);background:var(--card);}
  .header-top{display:flex;justify-content:space-between;align-items:baseline;}
  .header-icao{font-size:1.1rem;font-weight:700;letter-spacing:0.05em;}
  .header-elev{font-size:0.72rem;color:var(--muted);}
  .header-meta{font-size:0.72rem;color:var(--muted);margin-top:3px;display:flex;gap:12px;}
  .header-time{font-size:0.72rem;color:var(--muted);}

  .levels{padding:0;}

  .level{display:flex;align-items:center;gap:0;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--card);border-left:3px solid transparent;transition:border-color .2s;}
  .level.xw-warn{border-left-color:#f59e0b;}
  .level.xw-danger{border-left-color:#dc2626;}

  .level-alt{width:68px;flex-shrink:0;}
  .level-alt-ft{font-size:1rem;font-weight:700;display:block;line-height:1.1;}
  .level-alt-label{font-size:0.62rem;color:var(--muted);}

  .level-arrow{width:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .level-arrow svg{width:36px;height:36px;}

  .level-data{flex:1;}
  .level-kt{font-size:1.2rem;font-weight:700;display:inline;line-height:1;}
  .level-kt-unit{font-size:0.72rem;color:var(--muted);margin-left:2px;}
  .level-dir{font-size:0.75rem;color:var(--muted);margin-top:2px;}
  .level-kmh{font-size:0.65rem;color:var(--muted);margin-top:1px;}

  .level-xw{width:42px;flex-shrink:0;text-align:right;}
  .xw-label{font-size:0.55rem;color:var(--muted);display:block;}
  .xw-val{font-size:0.82rem;font-weight:600;}
  .xw-val.warn{color:#f59e0b;}
  .xw-val.danger{color:#dc2626;}

  .loading{padding:40px 16px;text-align:center;color:var(--muted);font-size:0.85rem;}
  .error{padding:16px;background:#fff5f5;border-left:3px solid #dc2626;margin:12px 16px;font-size:0.82rem;color:#dc2626;border-radius:4px;}

  .footer{padding:12px 16px;font-size:0.65rem;color:var(--muted);text-align:center;border-top:1px solid var(--border);}
  .refresh-btn{display:block;margin:8px auto 0;padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--bg);font-family:var(--font);font-size:0.75rem;cursor:pointer;color:var(--text);}

  .rwy-info{font-size:0.65rem;color:var(--muted);padding:6px 16px;background:#f8f8f6;border-bottom:1px solid var(--border);display:flex;gap:12px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-icao">EPKP</span>
    <span class="header-time" id="hdr-time">—</span>
  </div>
  <div class="header-meta">
    <span id="hdr-elev">664 ft AMSL</span>
    <span id="hdr-qnh">QNH: —</span>
    <span id="hdr-temp">T: —</span>
  </div>
</div>

<div class="rwy-info">
  <span>RWY 09/27 (090°/270°)</span>
  <span id="rwy-wind">XW: —</span>
</div>

<div class="levels" id="levels">
  <div class="loading">Ładowanie danych...</div>
</div>

<div class="footer">
  Open-Meteo · Kraków Balice · 50.087°N 20.201°E
  <button class="refresh-btn" onclick="loadData()">↻ Odśwież</button>
</div>

<script>
const LAT = 50.087, LON = 20.201, ELEV_FT = 664, ELEV_M = 202;
const RWY_HDG = 270; // runway 27 heading

// Height levels: [m AGL, label]
const LEVELS = [
  { m: 180, suffix: 'windspeed_180m', dirSuffix: 'winddirection_180m' },
  { m: 120, suffix: 'windspeed_120m', dirSuffix: 'winddirection_120m' },
  { m: 80,  suffix: 'windspeed_80m',  dirSuffix: 'winddirection_80m'  },
  { m: 10,  suffix: 'windspeed_10m',  dirSuffix: 'winddirection_10m'  },
];

function mToFtMSL(m) { return Math.round(ELEV_FT + m * 3.281); }
function kmhToKt(kmh) { return (kmh * 0.5399).toFixed(0); }
function dirName(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW','N'];
  return dirs[Math.round(deg / 45) % 8];
}
function crosswind(speed_kt, dir_deg) {
  // component perpendicular to RWY 09/27
  const angle = Math.abs(dir_deg - RWY_HDG) % 360;
  const rel = angle > 180 ? 360 - angle : angle;
  return Math.abs(Math.round(speed_kt * Math.sin(rel * Math.PI / 180)));
}

function arrowSVG(dir_deg) {
  // Arrow pointing DOWN by default = wind from N (dir=0)
  // Rotate by dir_deg to show correct direction
  return `<svg viewBox="0 0 40 40" style="transform:rotate(${dir_deg}deg);transition:transform .3s">
    <line x1="20" y1="6" x2="20" y2="28" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="12,20 20,30 28,20" stroke="var(--text)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

async function loadData() {
  const container = document.getElementById('levels');
  container.innerHTML = '<div class="loading">Ładowanie...</div>';

  const today = new Date().toISOString().slice(0,10);
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=pressure_msl,temperature_2m,windspeed_10m,windspeed_80m,windspeed_120m,windspeed_180m,winddirection_10m,winddirection_80m,winddirection_120m,winddirection_180m&start_date=${today}&end_date=${today}&timezone=UTC`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    const hourly = data.hourly;
    const times = hourly.time;

    // Find current UTC hour index
    const now = new Date();
    const utcHour = now.getUTCHours();
    let idx = times.findIndex(t => t.endsWith(`T${String(utcHour).padStart(2,'0')}:00`));
    if (idx < 0) idx = 0;

    // Header
    const qnh = hourly.pressure_msl[idx];
    const temp = hourly.temperature_2m[idx];
    const timeStr = times[idx].slice(11,16) + 'Z';
    document.getElementById('hdr-time').textContent = timeStr;
    document.getElementById('hdr-qnh').textContent = qnh ? `QNH: ${Math.round(qnh)} hPa / ${(qnh * 0.02953).toFixed(2)}"` : 'QNH: —';
    document.getElementById('hdr-temp').textContent = temp != null ? `T: ${temp.toFixed(1)}°C` : '';

    // Build levels HTML
    let html = '';
    let surfaceXW = 0;

    LEVELS.forEach(lv => {
      const spd_kmh = hourly[lv.suffix][idx];
      const dir = hourly[lv.dirSuffix][idx];
      const ft = mToFtMSL(lv.m);
      const kt = parseFloat(kmhToKt(spd_kmh));
      const xw = crosswind(kt, dir);
      if (lv.m === 10) surfaceXW = xw;

      let xwClass = '', rowClass = '';
      if (xw >= 15) { xwClass = 'danger'; rowClass = 'xw-danger'; }
      else if (xw >= 10) { xwClass = 'warn'; rowClass = 'xw-warn'; }

      html += `<div class="level ${rowClass}">
        <div class="level-alt">
          <span class="level-alt-ft">${ft}ft</span>
          <span class="level-alt-label">${lv.m}m AGL</span>
        </div>
        <div class="level-arrow">${arrowSVG(dir)}</div>
        <div class="level-data">
          <span class="level-kt">${kt}</span><span class="level-kt-unit">kt</span>
          <div class="level-dir">${dir}° ${dirName(dir)} &nbsp;·&nbsp; ${spd_kmh.toFixed(1)} km/h</div>
        </div>
        <div class="level-xw">
          <span class="xw-label">XW</span>
          <span class="xw-val ${xwClass}">${xw}kt</span>
        </div>
      </div>`;
    });

    container.innerHTML = html;
    document.getElementById('rwy-wind').textContent = `XW: ${surfaceXW}kt`;

  } catch(e) {
    container.innerHTML = `<div class="error">Błąd ładowania: ${e.message}</div>`;
  }
}

loadData();
// Auto-refresh co 30 min
setInterval(loadData, 30 * 60 * 1000);
</script>
</body>
</html>
