<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teoria - BrakarzLesny</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <a href="index.html">&#8592; BrakarzLesny</a>
  <h1 id="top-title">Teoria</h1>
</div>
<div id="view-grid" class="teoria-grid"></div>
<div id="view-section" style="display:none" class="section-view">
  <button class="btn btn-secondary btn-sm" onclick="showGrid()" style="margin-bottom:16px">&#8592; Moduly</button>
  <div id="section-content"></div>
</div>
<script src="icons-lesny.js"></script>
<script src="theory-lesny.js"></script>
<script>
function showGrid(){
  document.getElementById('view-grid').style.display='';
  document.getElementById('view-section').style.display='none';
  document.getElementById('top-title').textContent='Teoria';
}
function showSection(modId){
  const mod=THEORY_LESNY.find(m=>m.id===modId);
  if(!mod)return;
  document.getElementById('view-grid').style.display='none';
  document.getElementById('view-section').style.display='';
  document.getElementById('top-title').textContent=mod.title;
  document.getElementById('section-content').innerHTML=mod.sections.map(s=>`
    <div style="margin-bottom:24px">
      <h3>${s.heading}</h3>
      <p class="body-text">${s.body}</p>
      ${(s.examTips||[]).map(t=>`<div class="exam-tip">&#128161; ${t}</div>`).join('')}
    </div>`).join('');
}
document.getElementById('view-grid').innerHTML=THEORY_LESNY.map(m=>`
  <div class="modul-card" onclick="showSection('${m.id}')">
    <div class="icon">${ICONS_LESNY[m.id]||''}</div>
    <h3>${m.title}</h3>
    <p>${(m.sections||[]).length} sekcji</p>
  </div>`).join('');
</script>
</body>
</html>
