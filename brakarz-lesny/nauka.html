<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fiszki – BrakarzLeśny</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← BrakarzLeśny</a>
  <h1>Fiszki</h1>
</div>

<div class="fiszka-wrap">
  <div>
    <div class="fiszka" id="fiszka" onclick="flip()">
      <div class="side-label" id="side-label">Pojęcie</div>
      <div class="content" id="fiszka-content">Ładowanie...</div>
      <div class="flip-hint">Kliknij, by obrócić</div>
    </div>
    <div class="fiszka-nav">
      <button class="btn btn-secondary btn-sm" onclick="prev()">← Poprzednia</button>
      <span class="fiszka-counter" id="counter">1 / 1</span>
      <button class="btn btn-secondary btn-sm" onclick="next()">Następna →</button>
    </div>
    <div style="text-align:center;margin-top:8px">
      <button class="btn btn-secondary btn-sm" onclick="shuffle()">Tasuj</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="theory-lesny.js"></script>
<script>
let cards = [];
let idx = 0;
let flipped = false;

document.addEventListener('DOMContentLoaded', () => {
  buildCards();
  render();
});

function buildCards() {
  if (typeof TEORIA_MODULES === 'undefined') {
    cards = [{front:'Brak danych', back:'Załaduj theory-lesny.js'}];
    return;
  }
  cards = [];
  TEORIA_MODULES.forEach(m => {
    (m.sections || []).forEach(s => {
      if (s.heading && s.body) {
        cards.push({ front: s.heading, back: s.body });
      }
    });
  });
  if (!cards.length) cards = [{front:'Brak fiszek', back:'Dodaj sekcje do theory-lesny.js'}];
}

function render() {
  flipped = false;
  const c = cards[idx];
  document.getElementById('side-label').textContent = 'Pojęcie';
  document.getElementById('fiszka-content').textContent = c.front;
  document.getElementById('counter').textContent = `${idx + 1} / ${cards.length}`;
}

function flip() {
  flipped = !flipped;
  const c = cards[idx];
  document.getElementById('side-label').textContent = flipped ? 'Definicja' : 'Pojęcie';
  document.getElementById('fiszka-content').textContent = flipped ? c.back : c.front;
}

function prev() { idx = (idx - 1 + cards.length) % cards.length; render(); }
function next() { idx = (idx + 1) % cards.length; render(); }

function shuffle() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  idx = 0;
  render();
}
</script>
</body>
</html>
