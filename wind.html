<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EPKP Wind</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #07090f;
    --line: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #4d8ef5;
    --warn: #f5a623;
    --danger: #e84040;
    --green: #3ec87a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { min-height: 100%; background: #03040a; }

  body {
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background: radial-gradient(ellipse 700px 900px at 50% 35%, #0b1020 0%, #03040a 100%);
  }

  .wrapper {
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  @media (min-width: 500px) {
    .wrapper {
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 40px 100px rgba(0,0,0,0.85);
    }
  }

  /* HEADER */
  .hdr {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .hdr-icao { font-family: var(--mono); font-size: 1.65rem; letter-spacing: .08em; }
  .hdr-sub  { font-size: 1.01rem; color: var(--muted); margin-top: 3px; font-family: var(--mono); }
  .hdr-right { text-align: right; font-family: var(--mono); font-size: 0.6rem; color: var(--muted); line-height: 1.75; }
  .hdr-time  { color: var(--accent); }

  /* RUNWAY SELECTOR */
  .rwy-selector { display:flex; gap:8px; padding:10px 16px; border-bottom:1px solid rgba(255,255,255,.07); }
  .rwy-btn { flex:1; padding:8px; border:1px solid rgba(255,255,255,.15); border-radius:6px; background:transparent; color:var(--muted); font-family:var(--mono); font-size:0.9rem; font-weight:600; cursor:pointer; transition:all .15s; letter-spacing:.05em; }
  .rwy-btn.active { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.35); color:var(--text); }
  .rwy-btn:hover:not(.active) { border-color:rgba(255,255,255,.25); color:rgba(255,255,255,.6); }

  /* BAND */
  .band {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--line);
    padding: 11px 14px 11px 16px;
    gap: 0 10px;
    min-height: 88px;
    position: relative;
    background: rgba(255,255,255,0.03);
    overflow: hidden;
    transition: background .12s;
  }
  .band:last-child { border-bottom: none; }
  .band:hover { background: rgba(255,255,255,.045); }

  /* Left accent stripe */
  .band::before {
    content: '';
    position: absolute;
    left: 0; top: 18%; bottom: 18%;
    width: 2px;
    background: var(--stripe, rgba(77,142,245,.35));
    border-radius: 0 1px 1px 0;
  }

  /* Alt label */
  .band-alt {
    width: 56px;
    flex-shrink: 0;
    font-family: var(--mono);
  }
  .band-ft  { font-size: 1.31rem; font-weight: 600; color: var(--text); line-height: 1; }
  .band-ft sup { font-size: 0.69rem; }
  .band-m   { font-size: 0.84rem; color: var(--muted); margin-top: 3px; }
  .pws-badge { font-size: 0.65rem; color: var(--muted); vertical-align: middle; }
  .pws-time  { font-size: 0.62rem; color: var(--muted); font-family: var(--mono); margin-top: 2px; opacity: .7; }

  /* Isometric arrow area */
  .band-arrow {
    width: 62px;
    height: 62px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Disc platform under arrow */
  .band-arrow::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(255,255,255,.06);
  }

  /* Elliptical cast shadow */
  .band-arrow::after {
    content: '';
    position: absolute;
    bottom: 7px; left: 50%;
    transform: translateX(-50%);
    width: 26px; height: 5px;
    background: rgba(0,0,0,.55);
    border-radius: 50%;
    filter: blur(3px);
  }

  /* Right column: streaks + info */
  .band-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
    overflow: hidden;
  }

  .band-streaks {
    display: block;
    width: 100%;
    height: 44px;
    flex-shrink: 0;
    border-radius: 3px;
  }

  .band-info {
    display: flex;
    align-items: baseline;
    gap: 7px;
    font-family: var(--mono);
    flex-shrink: 0;
  }
  .band-kt  { font-size: 1.58rem; color: var(--text); }
  .band-kt small { font-size: 0.86rem; color: var(--muted); margin-left: 1px; }
  .band-dir { font-size: 0.95rem; color: var(--muted); }
  .band-kmh { font-size: 0.86rem; color: rgba(255,255,255,.18); }

  .loading { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 1.28rem; font-family: var(--mono); }
  .error   {
    padding: 16px; margin: 12px 16px;
    background: rgba(232,64,64,.08);
    border: 1px solid rgba(232,64,64,.3);
    border-radius: 6px;
    font-size: 1.2rem; color: var(--danger); font-family: var(--mono);
  }

  .metar-section { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.07); }
  .metar-label { font-size: .65rem; color: var(--muted); margin-bottom: 4px; letter-spacing: .06em; text-transform: uppercase; font-family: var(--mono); }
  .metar-raw { font-family: var(--mono); font-size: .82rem; color: rgba(255,255,255,.7); line-height: 1.5; word-break: break-all; }
  .metar-time { font-size: .6rem; color: var(--muted); margin-top: 3px; font-family: var(--mono); }

  .footer {
    padding: 12px 16px;
    font-size: 0.93rem; color: var(--muted);
    font-family: var(--mono);
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .refresh-btn {
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    color: var(--muted); font-family: var(--mono); font-size: 0.98rem;
    padding: 4px 10px; border-radius: 4px; cursor: pointer;
  }
  .refresh-btn:active { opacity: .7; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="hdr">
    <div>
      <div class="hdr-icao">EPKP</div>
      <div class="hdr-sub">KRAKÓW POBIEDNIK</div>
      <div class="hdr-sub" style="font-size:0.78rem;">664ft AMSL &middot; INFO 119.750</div>
    </div>
    <div class="hdr-right">
      <div><span id="hdr-time" class="hdr-time">——:——Z</span>&nbsp; <span id="hdr-date">——</span></div>
      <div id="hdr-lt">——:—— LT</div>
      <div id="hdr-qnh">QNH ——</div>
      <div id="hdr-temp">T ——°C</div>
    </div>
  </div>

  <div class="rwy-selector">
    <button class="rwy-btn active" data-rwy="27" data-hdg="270">RWY 27</button>
    <button class="rwy-btn" data-rwy="09" data-hdg="90">RWY 09</button>
  </div>

  <div id="bands">
    <div class="loading">Ładowanie...</div>
  </div>

  <div class="metar-section">
    <div class="metar-label">METAR EPKK</div>
    <div class="metar-raw" id="metar-text">ładowanie...</div>
    <div class="metar-time" id="metar-time"></div>
  </div>

  <div class="footer">
    <span>Gradient wiatru na pułapach — Kraków Pobiednik</span>
    <button class="refresh-btn" onclick="loadData()">↻</button>
  </div>

</div>

<!-- RWY 27 diagram — bottom right -->
<svg style="position:fixed;bottom:10px;right:10px;pointer-events:none;" width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <polygon points="22,78 98,78 80,8 40,8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="60" y1="70" x2="60" y2="18" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="60" y="76" text-anchor="middle" font-size="11" font-family="monospace" fill="rgba(255,255,255,0.45)" font-weight="bold" letter-spacing="1">27</text>
</svg>
<script>
const LAT = 50.087, LON = 20.201, ELEV_FT = 664;
let RWY_HDG = 270;
let currentBandData = null;
let currentPws = null;

const LVLS = [
  { m: 180, ws: 'windspeed_180m', wd: 'winddirection_180m' },
  { m: 120, ws: 'windspeed_120m', wd: 'winddirection_120m' },
  { m:  80, ws: 'windspeed_80m',  wd: 'winddirection_80m'  },
  { m:  10, ws: 'windspeed_10m',  wd: 'winddirection_10m'  },
];

function ftMSL(m)    { return Math.round(ELEV_FT + m * 3.281); }
function toKt(kmh)   { return kmh * 0.5399; }
function dirName(d) {
  const n = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return n[Math.round(((d % 360) + 360) % 360 / 22.5) % 16];
}
function getLT() {
  return new Intl.DateTimeFormat('pl-PL', { timeZone: 'Europe/Warsaw', hour:'2-digit', minute:'2-digit', hour12:false }).format(new Date());
}
function getDate() {
  return new Intl.DateTimeFormat('pl-PL', { timeZone: 'Europe/Warsaw', day:'2-digit', month:'2-digit', year:'numeric' }).format(new Date());
}
function updateTimeDisplay() {
  document.getElementById('hdr-lt').textContent = getLT() + ' LT';
  document.getElementById('hdr-date').textContent = getDate();
}

function crosswind(kt, dir) {
  const a = ((dir - RWY_HDG) % 360 + 360) % 360;
  const rel = a > 180 ? 360 - a : a;
  return Math.abs(Math.round(kt * Math.sin(rel * Math.PI / 180)));
}

/* ---- Vector arrow SVG ---- */
function arrowSVG(windDir) {
  const tx = `perspective(180px) rotateX(54deg) rotateZ(${windDir - RWY_HDG + 180}deg)`;
  return `<svg viewBox="0 0 32 32" width="52" height="52"
      style="position:relative;z-index:1;transform:${tx};">
    <line x1="16" y1="28" x2="16" y2="8" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
    <polygon points="16,4 11,12 21,12" fill="rgba(255,255,255,0.9)"/>
  </svg>`;
}

/* ---- Streak particle animation ---- */
let activeStreaks = [];

function stopAllStreaks() {
  activeStreaks.forEach(s => s.stop());
  activeStreaks = [];
}

class StreakAnim {
  constructor(canvas, windDir, windKt) {
    this.canvas  = canvas;
    this.ctx     = canvas.getContext('2d');
    this.windDir = windDir;
    this.windKt  = windKt;
    this.alive   = true;
    this.raf     = null;
    this._setup();
  }

  _setup() {
    const dpr = window.devicePixelRatio || 1;
    const W = this.canvas.clientWidth  || 200;
    const H = this.canvas.clientHeight || 44;
    this.canvas.width  = W * dpr;
    this.canvas.height = H * dpr;
    this.ctx.scale(dpr, dpr);
    this.W = W; this.H = H;

    // velocity direction: wind blows TO (windDir + 180)
    // Use same reference frame as arrows: relative to RWY27 (270°)
    const toRad = ((this.windDir - RWY_HDG + 180 + 360) % 360) * Math.PI / 180;
    this.vx = Math.sin(toRad);
    this.vy = -Math.cos(toRad);   // canvas y increases downward

    this.speed = Math.max(0.35, this.windKt * 0.13);

    const N = Math.max(8, Math.floor(W / 17));
    this.particles = Array.from({ length: N }, (_, i) => ({
      x:     Math.random() * W,
      y:     Math.random() * H,
      len:   7 + Math.random() * 13,
      alpha: 0.10 + Math.random() * 0.28,
      lw:    0.7  + Math.random() * 0.9,
    }));
  }

  _tick() {
    if (!this.alive) return;
    this._update();
    this._draw();
    this.raf = requestAnimationFrame(() => this._tick());
  }

  _update() {
    const { vx, vy, speed, W, H } = this;
    const pad = 35;
    this.particles.forEach(p => {
      p.x += vx * speed;
      p.y += vy * speed;
      if      (p.x < -pad)    p.x += W + pad * 2;
      else if (p.x > W + pad) p.x -= W + pad * 2;
      if      (p.y < -pad)    p.y += H + pad * 2;
      else if (p.y > H + pad) p.y -= H + pad * 2;
    });
  }

  _draw() {
    const { ctx, vx, vy, W, H } = this;
    ctx.clearRect(0, 0, W, H);

    this.particles.forEach(p => {
      const tx = p.x - vx * p.len;
      const ty = p.y - vy * p.len;

      const g = ctx.createLinearGradient(tx, ty, p.x, p.y);
      g.addColorStop(0,   `rgba(255,255,255,0)`);
      g.addColorStop(0.4, `rgba(255,255,255,${p.alpha * 0.5})`);
      g.addColorStop(1,   `rgba(255,255,255,${p.alpha})`);

      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = g;
      ctx.lineWidth   = p.lw;
      ctx.lineCap     = 'round';
      ctx.stroke();
    });
  }

  start() { this._tick(); }
  stop()  { this.alive = false; if (this.raf) cancelAnimationFrame(this.raf); }
}

/* ---- PWS IPOBIE2 fetch ---- */
async function fetchPWS() {
  try {
    const res = await fetch('https://api.weather.com/v2/pws/observations/current?stationId=IPOBIE2&format=json&units=m&apiKey=6532d6454b8aa370768d2ac32b5b8d78');
    if (!res.ok) return null;
    const d = await res.json();
    const obs = d.observations?.[0];
    if (!obs) return null;
    return {
      speed_kmh: obs.metric.windSpeed,
      dir: obs.winddir,
      time: obs.obsTimeUtc,
      source: 'PWS'
    };
  } catch(e) { return null; }
}

/* ---- METAR EPKK fetch ---- */
async function fetchMetar() {
  try {
    const res = await fetch('https://metar.vatsim.net/metar.php?id=EPKK');
    if (res.ok) {
      const text = (await res.text()).trim();
      if (text && text.includes('EPKK')) {
        document.getElementById('metar-text').textContent = text;
        const m = text.match(/EPKK\s+(\d{6})Z/);
        if (m) document.getElementById('metar-time').textContent = m[1].slice(0,2) + ':' + m[1].slice(2,4) + 'Z';
        return;
      }
    }
  } catch(e) {}
  try {
    const res2 = await fetch('https://tgftp.nws.noaa.gov/data/observations/metar/stations/EPKK.TXT');
    if (res2.ok) {
      const lines = (await res2.text()).trim().split('\n');
      const metar = lines.find(l => l.includes('EPKK')) || lines[lines.length-1];
      document.getElementById('metar-text').textContent = metar.trim();
    }
  } catch(e) {
    document.getElementById('metar-text').textContent = 'brak połączenia';
  }
}

/* ---- Update ground band with PWS data ---- */
function updateGroundBand(pws) {
  currentPws = pws;
  const band = document.getElementById('band-ground');
  if (!band || !pws) return;

  const kt = toKt(pws.speed_kmh);
  const xw = crosswind(kt, pws.dir);
  const stripe = xw >= 15 ? 'rgba(232,64,64,.4)' : 'rgba(77,142,245,.32)';
  band.style.setProperty('--stripe', stripe);

  const altEl = band.querySelector('.band-ft');
  if (altEl) altEl.innerHTML = '~33<sup>ft</sup>';

  // PWS badge with freshness dot
  const badgeEl = document.getElementById('pws-badge');
  if (badgeEl) {
    const ageMin = pws.time ? (Date.now() - new Date(pws.time).getTime()) / 60000 : 99;
    const dotColor = ageMin < 5 ? '#3ec87a' : '#f5a623';
    badgeEl.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${dotColor};margin-right:2px;vertical-align:middle;"></span>PWS`;
  }

  // PWS timestamp
  const timeEl = document.getElementById('pws-time');
  if (timeEl && pws.time) {
    const t = new Date(pws.time);
    const hh = String(t.getUTCHours()).padStart(2,'0');
    const mm = String(t.getUTCMinutes()).padStart(2,'0');
    timeEl.textContent = `${hh}:${mm}Z`;
  }

  const arrowEl = band.querySelector('.band-arrow');
  if (arrowEl) arrowEl.innerHTML = arrowSVG(pws.dir);

  const ktEl = band.querySelector('.band-kt');
  if (ktEl) ktEl.innerHTML = `${kt.toFixed(0)}<small>kt</small>`;
  const dirEl = band.querySelector('.band-dir');
  if (dirEl) dirEl.textContent = `${pws.dir}° ${dirName(pws.dir)}`;
  const kmhEl = band.querySelector('.band-kmh');
  if (kmhEl) kmhEl.textContent = `${pws.speed_kmh.toFixed(1)}km/h`;

  // Restart streak animation for ground band
  const canvas = band.querySelector('.band-streaks');
  if (canvas) {
    const existing = activeStreaks.find(s => s.canvas === canvas);
    if (existing) {
      existing.stop();
      activeStreaks = activeStreaks.filter(s => s !== existing);
    }
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const s = new StreakAnim(canvas, pws.dir, kt);
      s.start();
      activeStreaks.push(s);
    }));
  }
}

/* ---- Rerender arrows when RWY changes ---- */
function rerenderArrows() {
  if (!currentBandData) return;
  stopAllStreaks();

  document.querySelectorAll('.band').forEach((band, i) => {
    const isGround = band.id === 'band-ground';
    const entry = currentBandData[i];
    if (!entry) return;

    const { dir, kt } = (isGround && currentPws)
      ? { dir: currentPws.dir, kt: toKt(currentPws.speed_kmh) }
      : entry;

    const xw = crosswind(kt, dir);
    band.style.setProperty('--stripe', xw >= 15 ? 'rgba(232,64,64,.4)' : 'rgba(77,142,245,.32)');

    const arrowEl = band.querySelector('.band-arrow');
    if (arrowEl) arrowEl.innerHTML = arrowSVG(dir);
  });

  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.band').forEach((band, i) => {
      const isGround = band.id === 'band-ground';
      const entry = currentBandData[i];
      if (!entry) return;
      const { dir, kt } = (isGround && currentPws)
        ? { dir: currentPws.dir, kt: toKt(currentPws.speed_kmh) }
        : entry;
      const canvas = band.querySelector('.band-streaks');
      if (!canvas) return;
      const s = new StreakAnim(canvas, dir, kt);
      s.start();
      activeStreaks.push(s);
    });
  }));
}

/* ---- Data fetch & render ---- */
async function loadData() {
  const bandsEl = document.getElementById('bands');
  bandsEl.innerHTML = '<div class="loading">Ładowanie danych...</div>';
  stopAllStreaks();

  const today = new Date().toISOString().slice(0, 10);
  const fields = [
    'pressure_msl','temperature_2m',
    'windspeed_10m','windspeed_80m','windspeed_120m','windspeed_180m',
    'winddirection_10m','winddirection_80m','winddirection_120m','winddirection_180m',
  ].join(',');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=${fields}&start_date=${today}&end_date=${today}&timezone=UTC`;

  try {
    const [res, pws] = await Promise.all([fetch(url), fetchPWS()]);
    const data = await res.json();
    const h    = data.hourly;
    const utcH = new Date().getUTCHours();
    let idx = h.time.findIndex(t => t.endsWith(`T${String(utcH).padStart(2,'0')}:00`));
    if (idx < 0) idx = 0;

    const qnh  = h.pressure_msl[idx];
    const temp = h.temperature_2m[idx];
    document.getElementById('hdr-time').textContent =
      h.time[idx].slice(11, 16) + 'Z';
    updateTimeDisplay();
    if (qnh) {
      const inHg = (qnh * 0.02953).toFixed(2);
      document.getElementById('hdr-qnh').textContent =
        `QNH ${Math.round(qnh)} hPa / ${inHg}"Hg`;
    } else {
      document.getElementById('hdr-qnh').textContent = 'QNH —';
    }
    document.getElementById('hdr-temp').textContent =
      temp != null ? `T ${temp.toFixed(1)}°C` : '';

    currentBandData = [];
    let html = '';

    LVLS.forEach((lv, i) => {
      const isGround = i === LVLS.length - 1;
      const spd_kmh = h[lv.ws][idx] || 0;
      const dir     = h[lv.wd][idx] || 0;
      const ft      = ftMSL(lv.m);
      const kt      = toKt(spd_kmh);
      const xw      = crosswind(kt, dir);

      currentBandData.push({ dir, kt });

      const stripe = xw >= 15 ? 'rgba(232,64,64,.4)' : 'rgba(77,142,245,.32)';
      const altFt  = (isGround && pws) ? '~33<sup>ft</sup>' : `${ft}<sup>ft</sup>`;
      const idAttr = isGround ? ' id="band-ground"' : '';

      const altSection = isGround
        ? `<div class="band-ft">${altFt}</div>
          <div class="band-m">10m AGL <span class="pws-badge" id="pws-badge"></span></div>
          <div class="pws-time" id="pws-time"></div>`
        : `<div class="band-ft">${altFt}</div>
          <div class="band-m">${lv.m}m AGL</div>`;

      html += `
      <div class="band" style="--stripe:${stripe}"${idAttr}>
        <div class="band-alt">
          ${altSection}
        </div>
        <div class="band-arrow">
          ${arrowSVG(dir)}
        </div>
        <div class="band-right">
          <canvas class="band-streaks" data-idx="${i}"></canvas>
          <div class="band-info">
            <span class="band-kt">${kt.toFixed(0)}<small>kt</small></span>
            <span class="band-dir">${dir}° ${dirName(dir)}</span>
            <span class="band-kmh">${spd_kmh.toFixed(1)}km/h</span>
          </div>
        </div>
      </div>`;
    });

    bandsEl.innerHTML = html;

    // Start streaks after layout is complete (double rAF ensures paint)
    requestAnimationFrame(() => requestAnimationFrame(() => {
      bandsEl.querySelectorAll('.band-streaks').forEach(canvas => {
        const i = +canvas.dataset.idx;
        const { dir, kt } = currentBandData[i];
        const s = new StreakAnim(canvas, dir, kt);
        s.start();
        activeStreaks.push(s);
      });

      // Override ground band with live PWS data if available
      if (pws) updateGroundBand(pws);
    }));

  } catch (e) {
    stopAllStreaks();
    bandsEl.innerHTML = `<div class="error">Błąd: ${e.message}</div>`;
  }
}

// RWY selector
document.querySelectorAll('.rwy-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rwy-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    RWY_HDG = parseInt(btn.dataset.hdg);
    rerenderArrows();
  });
});

loadData();
fetchMetar();
updateTimeDisplay();

// Update LT every minute
setInterval(updateTimeDisplay, 60 * 1000);

// Wind data (Open-Meteo + PWS): every 5 minutes
setInterval(loadData, 5 * 60 * 1000);

// METAR: every 5 minutes
setInterval(fetchMetar, 5 * 60 * 1000);

// PWS ground band: every 30 seconds independently
setInterval(async () => {
  const pws = await fetchPWS();
  if (pws) updateGroundBand(pws);
}, 30 * 1000);
</script>
</body>
</html>
