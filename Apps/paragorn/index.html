<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paragorn — Wydatki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg:     #fafaf8;
  --text:   #111111;
  --muted:  #888888;
  --border: #e2e2e0;
  --hover:  #f5f5f3;
  --olive:  #7a9e7e;
  --olive-l:#eef3ee;
  --danger: #c0392b;
  --font:   'Inter', system-ui, -apple-system, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; font-family: var(--font); border: none; outline: none; background: none; }
input, select { font-family: var(--font); }

/* ── HEADER ─────────────────────────────────────── */
.header {
  display: flex; align-items: center; gap: 10px;
  height: 40px; padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 100;
}
.header-back {
  color: var(--muted); text-decoration: none; font-size: 12px;
  display: flex; align-items: center; gap: 3px; flex-shrink: 0;
}
.header-back:hover { color: var(--text); }
.header-back svg { width: 14px; height: 14px; }
.header-title {
  font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; flex: 1;
}
.header-actions { display: flex; align-items: center; gap: 6px; }
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border); flex-shrink: 0; transition: background .3s;
}
.sync-dot.ok  { background: var(--olive); }
.sync-dot.err { background: var(--danger); }
.sync-dot.busy{ background: var(--text); animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.icon-btn {
  color: var(--muted); padding: 4px; border-radius: 4px;
  display: flex; align-items: center; line-height: 0;
  transition: color .12s;
}
.icon-btn:hover { color: var(--text); }

/* ── MONTH NAV + FILTERS ─────────────────────────── */
.nav-bar {
  display: flex; align-items: center;
  padding: 0 16px; height: 38px;
  border-bottom: 1px solid var(--border);
  gap: 10px; background: var(--bg);
}
.nav-arrows { display: flex; align-items: center; gap: 2px; }
.nav-arrow {
  color: var(--muted); padding: 3px 6px; border-radius: 4px;
  font-size: 13px; font-weight: 600; line-height: 1;
  transition: color .12s, background .12s;
}
.nav-arrow:hover { color: var(--text); background: var(--hover); }
.nav-arrow:disabled { opacity: .3; cursor: default; }
.nav-label {
  font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  min-width: 110px; text-align: center; color: var(--text);
}
.nav-sep { flex: 1; }
.fchip {
  font-size: 11px; font-weight: 500; color: var(--muted);
  padding: 3px 9px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg);
  transition: all .12s; white-space: nowrap;
}
.fchip.active { background: var(--text); color: #fff; border-color: var(--text); }

.date-range {
  display: none; align-items: center; gap: 6px;
  padding: 6px 16px; border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.date-range.show { display: flex; }
.date-range input[type="date"] {
  border: 1px solid var(--border); border-radius: 5px;
  padding: 4px 8px; font-size: 12px; color: var(--text);
  background: var(--bg); outline: none;
}
.date-range input[type="date"]:focus { border-color: var(--text); }

/* ── BULK BAR ────────────────────────────────────── */
.bulk-bar {
  display: none; align-items: center; gap: 10px;
  padding: 7px 16px; border-bottom: 1px solid var(--border);
  background: var(--olive-l);
}
.bulk-bar.show { display: flex; }
.bulk-count { flex: 1; font-size: 12px; font-weight: 600; color: var(--text); }
.btn-sum {
  background: var(--text); color: #fff;
  border-radius: 5px; padding: 5px 14px;
  font-size: 12px; font-weight: 600;
}

/* ── LIST HEADER ─────────────────────────────────── */
.list-head {
  display: flex; align-items: center; padding: 7px 16px;
  border-bottom: 1px solid var(--border); gap: 8px;
  background: var(--bg);
}
.list-head label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.exp-count { font-size: 11px; color: var(--muted); margin-left: auto; }
.exp-check { width: 14px; height: 14px; accent-color: var(--text); cursor: pointer; flex-shrink: 0; }

/* ── EXPENSE LIST ────────────────────────────────── */
.exp-list { list-style: none; padding: 0 0 90px; }

.exp-item {
  display: flex; align-items: center;
  padding: 0 16px 0 12px; height: 58px; gap: 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg); transition: background .1s;
}
.exp-item:hover { background: var(--hover); }
.exp-item.selected { background: var(--olive-l); }

.cat-wrap {
  width: 28px; height: 28px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.cat-wrap svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

.exp-body { flex: 1; min-width: 0; }
.exp-name {
  font-size: 0.82rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 150px; display: block;
}
.exp-meta {
  font-size: 0.7rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; gap: 4px; align-items: center; margin-top: 1px;
}
.exp-meta-dot { width: 2px; height: 2px; border-radius: 50%; background: var(--border); flex-shrink: 0; }

.exp-right { text-align: right; flex-shrink: 0; }
.exp-amt { font-size: 0.82rem; font-weight: 700; }
.exp-eur { font-size: 0.68rem; color: var(--muted); }

.btn-del {
  color: var(--border); padding: 4px; border-radius: 4px;
  display: flex; align-items: center; flex-shrink: 0;
  transition: color .12s;
}
.btn-del:hover { color: var(--danger); }
.btn-del svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

/* ── EMPTY ───────────────────────────────────────── */
.empty { padding: 60px 20px; text-align: center; }
.empty svg { width: 40px; height: 40px; stroke: var(--border); fill: none; margin: 0 auto 12px; display: block; stroke-width: 1.2; }
.empty-title { font-size: 0.82rem; font-weight: 600; color: var(--muted); }
.empty-sub   { font-size: 0.72rem; color: var(--border); margin-top: 4px; }

/* ── FAB ─────────────────────────────────────────── */
.fab {
  position: fixed; bottom: 22px; right: 18px; z-index: 50;
  background: var(--text); color: #fff;
  border-radius: 50px; padding: 11px 18px;
  font-size: 0.8rem; font-weight: 600;
  display: flex; align-items: center; gap: 7px;
  box-shadow: 0 2px 12px rgba(0,0,0,.18);
  transition: transform .13s, box-shadow .13s;
}
.fab:active { transform: scale(.96); }
.fab svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.2; }

/* ── OVERLAY / SHEET ─────────────────────────────── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; align-items: flex-end; }
.overlay.show { display: flex; }
.sheet {
  background: #fff; border-radius: 12px 12px 0 0;
  width: 100%; max-height: 92vh; overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom, 16px);
  animation: su .18s ease;
}
@keyframes su { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
.sheet-handle { width: 36px; height: 3px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
.sheet-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 18px 11px; border-bottom: 1px solid var(--border);
}
.sheet-title { font-size: 0.88rem; font-weight: 700; }
.btn-close {
  background: var(--hover); border-radius: 50%;
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 15px; flex-shrink: 0;
}
.sheet-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 13px; }

/* ── FORM ────────────────────────────────────────── */
.flabel {
  font-size: 0.68rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 5px; display: block;
}
.finput {
  width: 100%; border: 1px solid var(--border); border-radius: 6px;
  padding: 9px 11px; font-size: 0.82rem; color: var(--text);
  background: var(--bg); outline: none; transition: border .13s;
}
.finput:focus { border-color: var(--text); }

/* CHIPS */
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 13px; font-size: 0.78rem; font-weight: 500;
  color: var(--muted); transition: all .12s; cursor: pointer;
}
.chip.active { background: var(--text); color: #fff; border-color: var(--text); }

/* DROPZONE */
.dz {
  border: 1.5px dashed var(--border); border-radius: 7px;
  padding: 18px 14px; text-align: center; cursor: pointer;
  position: relative; transition: all .13s; color: var(--muted);
  font-size: 0.78rem; line-height: 1.6;
}
.dz:hover, .dz.over { border-color: var(--text); background: var(--hover); }
.dz input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.dz svg { width: 24px; height: 24px; margin: 0 auto 6px; display: block; stroke: var(--border); fill: none; stroke-width: 1.4; }
.dz-preview { display: flex; align-items: center; gap: 10px; background: var(--hover); border-radius: 6px; padding: 9px 11px; }
.dz-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
.dz-pdf { width: 36px; height: 36px; background: var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.dz-pdf svg { width: 18px; height: 18px; stroke: var(--muted); fill: none; stroke-width: 1.5; margin: 0; display: block; }
.dz-name { flex: 1; font-size: 0.78rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dz-size { font-size: 0.68rem; color: var(--muted); }
.dz-clear { color: var(--muted); font-size: 16px; padding: 2px 4px; flex-shrink: 0; }
.dz-clear:hover { color: var(--danger); }

/* PRIMARY BTN */
.btn-primary {
  background: var(--text); color: #fff; border-radius: 6px;
  padding: 11px; font-size: 0.82rem; font-weight: 600;
  width: 100%; margin-top: 2px; transition: opacity .13s;
}
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

/* SECONDARY BTN */
.btn-secondary {
  background: var(--bg); color: var(--text); border-radius: 6px;
  padding: 10px; font-size: 0.8rem; font-weight: 500;
  width: 100%; border: 1px solid var(--border);
  transition: background .12s;
}
.btn-secondary:hover { background: var(--hover); }

/* ── SUMMARY ─────────────────────────────────────── */
.sum-section { margin-bottom: 12px; }
.sum-stitle { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.sum-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem;
}
.sum-row:last-child { border-bottom: none; }
.sum-label { color: var(--muted); }
.sum-val { font-weight: 700; }
.sum-total {
  background: var(--text); color: #fff; border-radius: 7px;
  padding: 13px 15px; display: flex; align-items: center;
  justify-content: space-between; margin: 10px 0 5px;
}
.sum-total-label { font-size: 0.75rem; opacity: .7; }
.sum-total-eur { font-size: 1.25rem; font-weight: 700; }
.sum-note { font-size: 0.68rem; color: var(--muted); text-align: center; margin-bottom: 10px; }
.btn-export {
  background: var(--text); color: #fff; border-radius: 6px;
  padding: 11px; font-size: 0.82rem; font-weight: 600; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-export:disabled { opacity: .4; cursor: not-allowed; }
.btn-export svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

/* ── RATE INFO ───────────────────────────────────── */
.rate-info { font-size: 0.72rem; color: var(--muted); text-align: center; min-height: 14px; }

/* ── DETAIL VIEW ─────────────────────────────────── */
.det-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 18px 11px; border-bottom: 1px solid var(--border);
}
.btn-back {
  font-size: 0.78rem; color: var(--muted); display: flex;
  align-items: center; gap: 4px; padding: 4px 0;
}
.btn-back:hover { color: var(--text); }
.btn-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
.btn-edit-toggle {
  font-size: 0.78rem; font-weight: 600; color: var(--text);
  padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border);
  background: var(--bg); transition: background .12s;
}
.btn-edit-toggle:hover { background: var(--hover); }
.btn-edit-toggle.active { background: var(--text); color: #fff; border-color: var(--text); }

.det-preview {
  width: 100%; max-height: 260px; object-fit: contain;
  display: block; background: var(--hover);
  border-bottom: 1px solid var(--border);
}
.det-preview-pdf {
  width: 100%; height: 140px; background: var(--hover);
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--border); gap: 10px; color: var(--muted);
  font-size: 0.78rem;
}
.det-preview-pdf svg { width: 32px; height: 32px; stroke: var(--border); fill: none; stroke-width: 1.2; }

.det-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 0; }
.det-field {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px;
}
.det-field:last-of-type { border-bottom: none; }
.det-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0; }
.det-value { font-size: 0.82rem; color: var(--text); text-align: right; }
.det-value.big { font-size: 1.05rem; font-weight: 700; }
.det-actions { display: flex; gap: 8px; padding: 14px 18px 0; }
.det-actions .btn-primary { margin-top: 0; }
.det-actions .btn-secondary { margin-top: 0; }

/* ── TOAST ───────────────────────────────────────── */
.toast {
  position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 8px 16px;
  border-radius: 20px; font-size: 0.78rem; font-weight: 600;
  z-index: 999; opacity: 0; transition: opacity .18s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }
.toast.success { background: var(--olive); color: #fff; }

/* ── SETTINGS ────────────────────────────────────── */
.st-hint { font-size: 0.68rem; color: var(--muted); margin-top: 5px; line-height: 1.5; }
#st-status { font-size: 0.72rem; text-align: center; min-height: 14px; color: var(--muted); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <span class="header-title">Paragorn</span>
  <div class="header-actions">
    <span class="sync-dot" id="sync-dot"></span>
    <button class="icon-btn" id="btn-settings" title="Gist Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<!-- MONTH NAV + FILTER CHIPS -->
<div class="nav-bar">
  <div class="nav-arrows">
    <button class="nav-arrow" id="m-prev">&#8249;</button>
    <span class="nav-label" id="m-label">LIPIEC 2026</span>
    <button class="nav-arrow" id="m-next">&#8250;</button>
  </div>
  <div class="nav-sep"></div>
  <button class="fchip active" data-f="month">Month</button>
  <button class="fchip" data-f="week">Week</button>
  <button class="fchip" data-f="custom">Range</button>
</div>
<div class="date-range" id="date-range">
  <input type="date" id="df"> <span style="color:var(--muted);font-size:11px">–</span> <input type="date" id="dt">
</div>

<!-- BULK BAR -->
<div class="bulk-bar" id="bulk-bar">
  <span class="bulk-count" id="bulk-count">0 selected</span>
  <button class="btn-sum" id="btn-sum">Summarise →</button>
</div>

<!-- LIST HEADER -->
<div class="list-head">
  <label>
    <input type="checkbox" class="exp-check" id="check-all">
    Select all
  </label>
  <span class="exp-count" id="exp-count"></span>
</div>

<!-- EXPENSE LIST -->
<ul class="exp-list" id="exp-list"></ul>

<!-- FAB -->
<button class="fab" id="btn-add">
  <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
  Add expense
</button>

<!-- DETAIL / EDIT MODAL -->
<div class="overlay" id="ov-detail">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="det-head">
      <button class="btn-back" id="detail-back">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
        Back
      </button>
      <span class="sheet-title" id="detail-title" style="font-size:0.82rem;font-weight:600;"></span>
      <button class="btn-edit-toggle" id="detail-edit-btn">Edit</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="ov-add">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title">New expense</span>
      <button class="btn-close" id="close-add">×</button>
    </div>
    <div class="sheet-body">
      <div>
        <label class="flabel">Attachment</label>
        <div class="dz" id="dz">
          <input type="file" id="file-in" accept="image/*,application/pdf">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div>Click or drag (JPG, PNG, PDF)</div>
          <div style="font-size:0.68rem;color:var(--border);margin-top:3px">max 5 MB</div>
        </div>
        <div id="dz-preview" style="display:none"></div>
      </div>
      <div>
        <label class="flabel">Amount</label>
        <input type="number" class="finput" id="amount" placeholder="0.00" step="0.01" min="0" style="font-size:1.1rem;font-weight:700;">
      </div>
      <div>
        <label class="flabel">Currency</label>
        <div class="chips" id="cur-chips">
          <button class="chip active" data-c="PLN">PLN</button>
          <button class="chip" data-c="EUR">EUR</button>
          <button class="chip" data-c="GBP">GBP</button>
          <button class="chip" data-c="other">Other</button>
        </div>
        <input type="text" class="finput" id="custom-cur" placeholder="e.g. USD, CHF…" maxlength="5" style="display:none;margin-top:7px;">
      </div>
      <div>
        <label class="flabel">Category</label>
        <div class="chips" id="cat-chips">
          <button class="chip active" data-k="transport">Transport</button>
          <button class="chip" data-k="hotel">Hotel</button>
          <button class="chip" data-k="food">Food</button>
          <button class="chip" data-k="other">Other</button>
        </div>
        <input type="text" class="finput" id="custom-cat" placeholder="Enter category…" style="display:none;margin-top:7px;">
      </div>
      <div>
        <label class="flabel">Note (optional)</label>
        <input type="text" class="finput" id="note" placeholder="e.g. taxi from airport…">
      </div>
      <div class="rate-info" id="rate-info"></div>
      <button class="btn-primary" id="btn-save">Add expense</button>
    </div>
  </div>
</div>

<!-- SUMMARY MODAL -->
<div class="overlay" id="ov-sum">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title">Summary</span>
      <button class="btn-close" id="close-sum">×</button>
    </div>
    <div class="sheet-body" id="sum-body"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="ov-settings">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title">Gist Sync</span>
      <button class="btn-close" id="close-settings">×</button>
    </div>
    <div class="sheet-body">
      <div>
        <label class="flabel">GitHub Personal Access Token</label>
        <input type="text" class="finput" id="st-token" placeholder="github_pat_…" autocomplete="off" spellcheck="false" style="font-family:monospace;font-size:11px;">
        <div class="st-hint">github.com → Settings → Developer settings → Tokens (classic) → select <strong>gist</strong></div>
      </div>
      <div>
        <label class="flabel">Gist ID</label>
        <input type="text" class="finput" id="st-gist" placeholder="e.g. a1b2c3d4… (empty = create new)" autocomplete="off" style="font-family:monospace;font-size:11px;">
        <div class="st-hint">Leave empty — a new Gist will be created on your first expense.</div>
      </div>
      <div id="st-status"></div>
      <button class="btn-primary" id="st-save">Save & Connect</button>
      <button class="btn-secondary" id="st-test">Test connection</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STORAGE
// ============================================================
const DB_KEY    = 'paragorn-expenses';
const TOK_KEY   = 'miniapps-gist-token';
const GIST_KEY  = 'miniapps-gist-id';
const GIST_FILE = 'paragorn-expenses.json';

const load = () => { try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); } catch { return []; } };
const save = d  => { localStorage.setItem(DB_KEY, JSON.stringify(d)); syncPush(d); };
const tok  = () => localStorage.getItem(TOK_KEY)  || '';
const gid  = () => localStorage.getItem(GIST_KEY) || '';

// ============================================================
// GIST SYNC
// ============================================================
const dot = document.getElementById('sync-dot');
const sd  = s => dot.className = 'sync-dot' + (s ? ' ' + s : '');

async function syncPush(data) {
  if (!tok() || !gid()) return;
  sd('busy');
  try {
    const body = { files: {} };
    body.files[GIST_FILE] = { content: JSON.stringify(data, null, 2) };
    const r = await fetch(`https://api.github.com/gists/${gid()}`, {
      method: 'PATCH',
      headers: { Authorization: `token ${tok()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    sd(r.ok ? 'ok' : 'err');
  } catch { sd('err'); }
}

async function syncPull() {
  if (!tok() || !gid()) return;
  sd('busy');
  try {
    const r = await fetch(`https://api.github.com/gists/${gid()}`, {
      headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json' }
    });
    if (!r.ok) { sd('err'); return; }
    const j = await r.json();
    const f = j.files?.[GIST_FILE];
    if (f?.content) { localStorage.setItem(DB_KEY, f.content); render(); }
    sd('ok');
  } catch { sd('err'); }
}

// ============================================================
// EXCHANGE RATES
// frankfurter.app blokowany przez CORS z GitHub Pages.
// Primary:  open.er-api.com  (~260ms, darmowe, bez klucza)
// Fallback: exchangerate-api.com (~530ms, darmowe, bez klucza)
// ============================================================
async function getEurRate(currency, _date) {
  if (!currency || currency === 'EUR') return 1;
  const cur = currency.toUpperCase();
  // PRIMARY
  try {
    const r = await fetch(`https://open.er-api.com/v6/latest/${encodeURIComponent(cur)}`);
    if (r.ok) { const j = await r.json(); if (j.rates?.EUR != null) return j.rates.EUR; }
  } catch {}
  // FALLBACK
  try {
    const r = await fetch(`https://api.exchangerate-api.com/v4/latest/${encodeURIComponent(cur)}`);
    if (r.ok) { const j = await r.json(); if (j.rates?.EUR != null) return j.rates.EUR; }
  } catch {}
  return null;
}

// ============================================================
// UI STATE
// ============================================================
const now0   = new Date();
let viewYear = now0.getFullYear();
let viewMonth= now0.getMonth();
let filter   = 'month';
let dateFrom = '';
let dateTo   = '';
let selCur   = 'PLN';
let selCat   = 'transport';
let fileData = null, fileName = '', fileType = '';
let selected = new Set();

// ============================================================
// HELPERS
// ============================================================
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const catSvg = k => {
  const icons = {
    transport: `<svg viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h3.5L8 4h8l1.5 3H21a2 2 0 012 2v6a2 2 0 01-2 2h-2m-5 0H9"/><circle cx="7.5" cy="17" r="2"/><circle cx="16.5" cy="17" r="2"/></svg>`,
    hotel:     `<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>`,
    food:      `<svg viewBox="0 0 24 24"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><line x1="7" y1="2" x2="7" y2="22"/><path d="M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>`,
    other:     `<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`
  };
  return icons[k] || icons.other;
};

const trunc   = (s, n) => !s ? '' : s.length > n ? s.slice(0, n) + '…' : s;
const fmtAmt  = (a, c) => `${parseFloat(a).toFixed(2)} ${c}`;
const fmtDate = iso => { const d = new Date(iso + 'T12:00:00'); return d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: '2-digit' }); };
const today   = () => new Date().toISOString().slice(0, 10);

function toast(msg, ms = 2200, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => el.classList.remove('show'), ms);
}

// ============================================================
// MONTH NAV
// ============================================================
function renderMonthLabel() {
  document.getElementById('m-label').textContent = `${MONTHS[viewMonth].toUpperCase()} ${viewYear}`;
  const isMonth = filter === 'month';
  document.getElementById('m-prev').disabled = !isMonth;
  document.getElementById('m-next').disabled = !isMonth;
}

document.getElementById('m-prev').addEventListener('click', () => {
  if (filter !== 'month') return;
  viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  selected.clear(); renderMonthLabel(); render();
});
document.getElementById('m-next').addEventListener('click', () => {
  if (filter !== 'month') return;
  viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  selected.clear(); renderMonthLabel(); render();
});

// ============================================================
// FILTER
// ============================================================
function filteredItems() {
  const all = load();
  if (filter === 'month') {
    return all.filter(e => {
      const d = new Date(e.date + 'T12:00:00');
      return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
    });
  }
  if (filter === 'week') {
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
    mon.setHours(0, 0, 0, 0);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23, 59, 59, 999);
    return all.filter(e => { const d = new Date(e.date + 'T12:00:00'); return d >= mon && d <= sun; });
  }
  if (filter === 'custom' && dateFrom && dateTo) {
    const from = new Date(dateFrom + 'T00:00:00');
    const to   = new Date(dateTo   + 'T23:59:59');
    return all.filter(e => { const d = new Date(e.date + 'T12:00:00'); return d >= from && d <= to; });
  }
  return all;
}

// ============================================================
// RENDER LIST
// ============================================================
function render() {
  const items = filteredItems();
  const list  = document.getElementById('exp-list');
  document.getElementById('exp-count').textContent = `${items.length} entries`;

  if (!items.length) {
    list.innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <div class="empty-title">No expenses</div>
        <div class="empty-sub">Add your first entry</div>
      </div>`;
    updateBulk(); return;
  }

  list.innerHTML = items.map(e => `
    <li class="exp-item${selected.has(e.id) ? ' selected' : ''}" data-id="${e.id}">
      <input type="checkbox" class="exp-check item-cb" data-id="${e.id}" ${selected.has(e.id) ? 'checked' : ''}>
      <div class="cat-wrap">${catSvg(e.category)}</div>
      <div class="exp-body">
        <span class="exp-name">${trunc(e.filename, 18)}</span>
        <div class="exp-meta">
          <span>${e.category}</span>
          <span class="exp-meta-dot"></span>
          <span>${fmtDate(e.date)}</span>
          ${e.note ? `<span class="exp-meta-dot"></span><span>${trunc(e.note, 20)}</span>` : ''}
        </div>
      </div>
      <div class="exp-right">
        ${e.eurAmount != null
          ? `<div class="exp-amt">${parseFloat(e.eurAmount).toFixed(2)} EUR</div>
             ${e.currency !== 'EUR' ? `<div class="exp-eur">${fmtAmt(e.amount, e.currency)}</div>` : ''}`
          : `<div class="exp-amt">${fmtAmt(e.amount, e.currency)}</div>`}
      </div>
      <button class="btn-del" data-del="${e.id}" title="Delete">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6m5 0V4h4v2"/></svg>
      </button>
    </li>
  `).join('');

  list.querySelectorAll('.item-cb').forEach(cb => {
    cb.addEventListener('change', ev => {
      ev.stopPropagation();
      cb.checked ? selected.add(cb.dataset.id) : selected.delete(cb.dataset.id);
      list.querySelector(`[data-id="${cb.dataset.id}"]`).classList.toggle('selected', cb.checked);
      updateBulk();
    });
    cb.addEventListener('click', ev => ev.stopPropagation());
  });

  list.querySelectorAll('[data-del]').forEach(b => {
    b.addEventListener('click', ev => {
      ev.stopPropagation();
      if (!confirm('Delete this expense?')) return;
      const all = load().filter(e => e.id !== b.dataset.del);
      selected.delete(b.dataset.del);
      save(all); render(); toast('Deleted');
    });
  });

  // Click on item body → open detail
  list.querySelectorAll('.exp-item').forEach(li => {
    li.addEventListener('click', ev => {
      if (ev.target.closest('.item-cb') || ev.target.closest('.btn-del')) return;
      openDetail(li.dataset.id);
    });
  });

  updateBulk();
}

function updateBulk() {
  const n = selected.size;
  document.getElementById('bulk-bar').classList.toggle('show', n > 0);
  document.getElementById('bulk-count').textContent = `${n} selected`;
}

// ============================================================
// FILTER HANDLERS
// ============================================================
document.querySelectorAll('.fchip').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fchip').forEach(x => x.classList.remove('active'));
    if (b.dataset.f === 'month') {
      // Reset to current month
      const n = new Date();
      viewYear = n.getFullYear(); viewMonth = n.getMonth();
      filter = 'month';
      document.getElementById('date-range').classList.remove('show');
      b.classList.add('active');
    } else if (filter === b.dataset.f) {
      // Deselect → back to month, keep current viewYear/viewMonth
      filter = 'month';
      document.getElementById('date-range').classList.remove('show');
    } else {
      b.classList.add('active');
      filter = b.dataset.f;
      document.getElementById('date-range').classList.toggle('show', filter === 'custom');
    }
    renderMonthLabel();
    selected.clear(); render();
  });
});

document.getElementById('df').addEventListener('change', e => { dateFrom = e.target.value; render(); });
document.getElementById('dt').addEventListener('change', e => { dateTo   = e.target.value; render(); });

document.getElementById('check-all').addEventListener('change', function () {
  filteredItems().forEach(e => this.checked ? selected.add(e.id) : selected.delete(e.id));
  render();
});

// ============================================================
// ADD MODAL
// ============================================================
document.getElementById('btn-add').addEventListener('click', () => { resetForm(); showOv('ov-add'); });
document.getElementById('close-add').addEventListener('click', () => hideOv('ov-add'));
document.getElementById('ov-add').addEventListener('click', e => { if (e.target === e.currentTarget) hideOv('ov-add'); });

function showOv(id) { document.getElementById(id).classList.add('show'); }
function hideOv(id) { document.getElementById(id).classList.remove('show'); }

function resetForm() {
  fileData = null; fileName = ''; fileType = '';
  document.getElementById('file-in').value = '';
  document.getElementById('dz').style.display = '';
  document.getElementById('dz-preview').style.display = 'none';
  document.getElementById('amount').value = '';
  document.getElementById('note').value = '';
  document.getElementById('rate-info').textContent = '';
  selCur = 'PLN';
  document.querySelectorAll('#cur-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.c === 'PLN'));
  document.getElementById('custom-cur').style.display = 'none';
  selCat = 'transport';
  document.querySelectorAll('#cat-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.k === 'transport'));
  document.getElementById('custom-cat').style.display = 'none';

  document.getElementById('custom-cur').value = '';
  document.getElementById('custom-cat').value = '';
}

// --- FILE ---
const fileIn = document.getElementById('file-in');
const dz     = document.getElementById('dz');
fileIn.addEventListener('change', () => handleFile(fileIn.files[0]));
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('File too large (max 5 MB)'); return; }
  fileName = file.name; fileType = file.type;
  const reader = new FileReader();
  reader.onload = ev => { fileData = ev.target.result; showPreview(file); };
  reader.readAsDataURL(file);
}

function showPreview(file) {
  dz.style.display = 'none';
  const isImg = file.type.startsWith('image/');
  const prev  = document.getElementById('dz-preview');
  prev.style.display = 'flex';
  prev.className = 'dz-preview';
  prev.innerHTML = `
    ${isImg
      ? `<img class="dz-thumb" src="${fileData}" alt="">`
      : `<div class="dz-pdf"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>`}
    <span class="dz-name">${file.name}</span>
    <span class="dz-size">${(file.size / 1024).toFixed(0)} KB</span>
    <button class="dz-clear" id="dz-clr">×</button>`;
  document.getElementById('dz-clr').addEventListener('click', () => {
    fileData = null; fileName = ''; fileType = '';
    fileIn.value = ''; dz.style.display = ''; prev.style.display = 'none';
  });
}

// --- CURRENCY ---
document.getElementById('cur-chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip'); if (!chip) return;
  document.querySelectorAll('#cur-chips .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active'); selCur = chip.dataset.c;
  document.getElementById('custom-cur').style.display = selCur === 'other' ? '' : 'none';
  scheduleRatePreview();
});

// --- CATEGORY ---
document.getElementById('cat-chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip'); if (!chip) return;
  document.querySelectorAll('#cat-chips .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active'); selCat = chip.dataset.k;
  document.getElementById('custom-cat').style.display = selCat === 'other' ? '' : 'none';
});

// --- RATE PREVIEW ---
let _rateTimer;
document.getElementById('amount').addEventListener('input', scheduleRatePreview);
document.getElementById('custom-cur').addEventListener('input', scheduleRatePreview);
function scheduleRatePreview() {
  clearTimeout(_rateTimer);
  _rateTimer = setTimeout(async () => {
    const amt = parseFloat(document.getElementById('amount').value);
    const cur = selCur === 'other' ? document.getElementById('custom-cur').value.trim().toUpperCase() : selCur;
    const info = document.getElementById('rate-info');
    if (!amt || cur === 'EUR') { info.textContent = ''; return; }
    info.textContent = 'Fetching rate…';
    const rate = await getEurRate(cur, null);
    info.textContent = rate
      ? `1 ${cur} = ${rate.toFixed(4)} EUR → ≈ ${(amt * rate).toFixed(2)} EUR`
      : `Could not fetch rate for ${cur}`;
  }, 600);
}

// --- SAVE ---
document.getElementById('btn-save').addEventListener('click', async () => {
  const amt = parseFloat(document.getElementById('amount').value);
  if (!amt || amt <= 0) { toast('⚠️ Enter an amount'); return; }
  if (!fileData)         { toast('⚠️ Add an attachment'); return; }
  const currency = selCur === 'other' ? (document.getElementById('custom-cur').value.trim().toUpperCase() || 'OTHER') : selCur;
  const category = selCat === 'other'  ? (document.getElementById('custom-cat').value.trim() || 'Other') : selCat;
  const note = document.getElementById('note').value.trim();
  const btn  = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Fetching rate…';
  const dateStr = today();
  const eurRate = await getEurRate(currency, dateStr);
  const entry = {
    id: Date.now().toString(), date: dateStr, createdAt: new Date().toISOString(),
    category, amount: amt, currency, filename: fileName, fileType, fileData,
    eurRate, eurAmount: eurRate !== null ? parseFloat((amt * eurRate).toFixed(4)) : null, note
  };
  const all = load(); all.unshift(entry); save(all);
  btn.disabled = false; btn.textContent = 'Add expense';
  hideOv('ov-add'); render(); toast('Expense added', 2200, 'success');
});

// ============================================================
// SUMMARY
// ============================================================
document.getElementById('btn-sum').addEventListener('click', openSummary);
document.getElementById('close-sum').addEventListener('click', () => hideOv('ov-sum'));
document.getElementById('ov-sum').addEventListener('click', e => { if (e.target === e.currentTarget) hideOv('ov-sum'); });

function openSummary() {
  const all = load();
  const items = all.filter(e => selected.has(e.id));
  if (!items.length) return;
  const byCur = {}, byCat = {};
  items.forEach(e => {
    byCur[e.currency] = (byCur[e.currency] || 0) + e.amount;
    if (!byCat[e.category]) byCat[e.category] = { eur: 0 };
    byCat[e.category].eur += e.eurAmount || 0;
  });
  const totalEur = items.reduce((s, e) => s + (e.eurAmount || 0), 0);
  const noRate   = items.filter(e => e.eurRate === null);

  const curRows = Object.entries(byCur).map(([c, a]) =>
    `<div class="sum-row"><span class="sum-label">${c}</span><span class="sum-val">${a.toFixed(2)} ${c}</span></div>`).join('');
  const catRows = Object.entries(byCat).map(([cat, d]) =>
    `<div class="sum-row"><span class="sum-label">${cat}</span><span class="sum-val">${d.eur > 0 ? d.eur.toFixed(2) + ' EUR' : '—'}</span></div>`).join('');

  document.getElementById('sum-body').innerHTML = `
    <div class="sum-section">
      <div class="sum-stitle">By currency (${items.length} entries)</div>${curRows}
    </div>
    <div class="sum-section">
      <div class="sum-stitle">By category (EUR)</div>${catRows}
    </div>
    <div class="sum-total">
      <span class="sum-total-label">TOTAL EUR</span>
      <span class="sum-total-eur">${totalEur.toFixed(2)} EUR</span>
    </div>
    ${noRate.length ? `<button id="btn-retry-rates" style="background:var(--olive-l);border:1px solid var(--olive);border-radius:6px;padding:9px;font-size:0.78rem;font-weight:600;color:var(--text);width:100%;margin-bottom:4px;">Recalculate missing rates (${noRate.length})</button>` : ''}
    <div class="sum-note">Rates via open.er-api.com · as of entry date</div>
    <button class="btn-export" id="btn-zip">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      Export ZIP
    </button>`;

  document.getElementById('btn-zip').addEventListener('click', () => exportZip(items));

  if (noRate.length) {
    document.getElementById('btn-retry-rates').addEventListener('click', async function () {
      this.disabled = true; this.textContent = 'Fetching…';
      const all = load(); let fixed = 0;
      for (const e of noRate) {
        const rate = await getEurRate(e.currency, e.date);
        if (rate !== null) {
          const idx = all.findIndex(x => x.id === e.id);
          if (idx !== -1) { all[idx].eurRate = rate; all[idx].eurAmount = parseFloat((all[idx].amount * rate).toFixed(4)); fixed++; }
        }
      }
      save(all); render(); hideOv('ov-sum');
      toast(fixed ? `Recalculated ${fixed} rate${fixed > 1 ? 's' : ''}` : 'Could not fetch rates');
    });
  }
  showOv('ov-sum');
}

// ============================================================
// ZIP EXPORT
// ============================================================
async function exportZip(items) {
  const btn = document.getElementById('btn-zip');
  btn.disabled = true; btn.innerHTML = `<span>Generating…</span>`;
  try {
    const zip = new JSZip();
    const folder = zip.folder('paragorn-wydatki');
    items.forEach(e => {
      if (!e.fileData) return;
      const b64 = e.fileData.split(',')[1];
      const ext  = e.filename.includes('.') ? e.filename.split('.').pop() : 'bin';
      folder.file(`${e.date}_${e.category}_${e.id.slice(-6)}.${ext}`, b64, { base64: true });
    });
    folder.file('podsumowanie.md', genMarkdown(items));
    const blob = await zip.generateAsync({ type: 'blob' });
    const url  = URL.createObjectURL(blob);
    Object.assign(document.createElement('a'), { href: url, download: `paragorn-${today()}.zip` }).click();
    URL.revokeObjectURL(url);
    toast('ZIP downloaded');
  } catch (err) { console.error(err); toast('ZIP generation error'); }
  btn.disabled = false;
  btn.innerHTML = `<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> Export ZIP`;
}

function genMarkdown(items) {
  const now0    = new Date().toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const totalEur = items.reduce((s, e) => s + (e.eurAmount || 0), 0);
  const byCur = {};
  items.forEach(e => { byCur[e.currency] = (byCur[e.currency] || 0) + e.amount; });
  let md = `# Business Expense Report\n\n**Date:** ${now0}\n\n---\n\n## Summary\n\n| Currency | Amount |\n|---|---|\n`;
  Object.entries(byCur).forEach(([c, a]) => { md += `| ${c} | ${a.toFixed(2)} |\n`; });
  md += `| **TOTAL EUR** | **${totalEur.toFixed(2)} EUR** |\n\n---\n\n## Details\n\n| Date | Category | File | Amount | Currency | Rate→EUR | EUR | Note |\n|---|---|---|---|---|---|---|---|\n`;
  items.forEach(e => {
    md += `| ${e.date} | ${e.category} | ${e.filename} | ${parseFloat(e.amount).toFixed(2)} | ${e.currency} | ${e.eurRate ? e.eurRate.toFixed(4) : 'N/A'} | ${e.eurAmount ? e.eurAmount.toFixed(2) : 'N/A'} | ${e.note || ''} |\n`;
  });
  md += `\n---\n\n## Exchange Rates\n\n`;
  const usedRates = {};
  items.filter(e => e.eurRate && e.currency !== 'EUR').forEach(e => {
    const key = `${e.date}|${e.currency}`;
    if (!usedRates[key]) usedRates[key] = { date: e.date, cur: e.currency, rate: e.eurRate };
  });
  Object.values(usedRates).forEach(r => { md += `- ${r.date}: 1 ${r.cur} = ${r.rate.toFixed(4)} EUR\n`; });
  return md;
}

document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('st-token').value = tok();
  document.getElementById('st-gist').value  = gid();
  document.getElementById('st-status').textContent = '';
  showOv('ov-settings');
});
document.getElementById('close-settings').addEventListener('click', () => hideOv('ov-settings'));
document.getElementById('ov-settings').addEventListener('click', e => { if (e.target === e.currentTarget) hideOv('ov-settings'); });

document.getElementById('st-save').addEventListener('click', async () => {
  const t = document.getElementById('st-token').value.trim();
  const g = document.getElementById('st-gist').value.trim();
  if (!t) { document.getElementById('st-status').textContent = 'Enter a token'; return; }
  if (t) localStorage.setItem(TOK_KEY, t);
  if (g) localStorage.setItem(GIST_KEY, g);
  hideOv('ov-settings');
  if (g) { await syncPull(); toast('Connected — data synced'); }
  else   { await syncPush(load()); const newId = localStorage.getItem(GIST_KEY); toast(newId ? 'Gist created' : 'Saved — Gist created on first expense'); }
});

document.getElementById('st-test').addEventListener('click', async () => {
  const t  = document.getElementById('st-token').value.trim();
  const g  = document.getElementById('st-gist').value.trim();
  const st = document.getElementById('st-status');
  if (!t) { st.textContent = 'Enter a token'; return; }
  st.textContent = 'Testing…';
  try {
    const url = g ? `https://api.github.com/gists/${g}` : 'https://api.github.com/gists?per_page=1';
    const r   = await fetch(url, { headers: { Authorization: `token ${t}`, Accept: 'application/vnd.github+json' } });
    st.style.color = r.ok ? 'var(--olive)' : 'var(--danger)';
    st.textContent = r.ok
      ? (g ? 'Token and Gist ID are valid' : 'Token is valid')
      : `Error ${r.status}: ${r.status === 401 ? 'bad token' : r.status === 404 ? 'bad Gist ID' : 'check credentials'}`;
  } catch { st.style.color = 'var(--danger)'; st.textContent = 'Network error'; }
});

// ============================================================
// DETAIL / EDIT VIEW
// ============================================================
let detailId   = null;
let detailMode = 'view'; // 'view' | 'edit'

document.getElementById('detail-back').addEventListener('click', () => hideOv('ov-detail'));
document.getElementById('ov-detail').addEventListener('click', e => { if (e.target === e.currentTarget) hideOv('ov-detail'); });
document.getElementById('detail-edit-btn').addEventListener('click', () => {
  detailMode = detailMode === 'view' ? 'edit' : 'view';
  renderDetail();
});

function openDetail(id) {
  detailId   = id;
  detailMode = 'view';
  renderDetail();
  showOv('ov-detail');
}

function renderDetail() {
  const entry = load().find(e => e.id === detailId);
  if (!entry) { hideOv('ov-detail'); return; }

  const editBtn = document.getElementById('detail-edit-btn');
  editBtn.textContent = detailMode === 'view' ? 'Edit' : 'Cancel';
  editBtn.classList.toggle('active', detailMode === 'edit');

  document.getElementById('detail-title').textContent = trunc(entry.filename, 20);

  if (detailMode === 'view') renderDetailView(entry);
  else                       renderDetailEdit(entry);
}

function renderDetailView(e) {
  const isImg = e.fileType && e.fileType.startsWith('image/');
  const previewHtml = e.fileData
    ? (isImg
        ? `<img class="det-preview" src="${e.fileData}" alt="${e.filename}">`
        : `<div class="det-preview-pdf">
             <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
             ${e.filename}
           </div>`)
    : '';

  document.getElementById('detail-body').innerHTML = `
    ${previewHtml}
    <div class="det-body">
      <div class="det-field"><span class="det-label">Amount</span><span class="det-value big">${fmtAmt(e.amount, e.currency)}</span></div>
      ${e.eurRate && e.currency !== 'EUR' ? `<div class="det-field"><span class="det-label">EUR equivalent</span><span class="det-value">≈ ${(e.amount * e.eurRate).toFixed(2)} EUR<br><span style="font-size:0.65rem;color:var(--muted)">rate ${e.eurRate.toFixed(4)} · ${e.date}</span></span></div>` : ''}
      <div class="det-field"><span class="det-label">Category</span><span class="det-value">${e.category}</span></div>
      <div class="det-field"><span class="det-label">Date</span><span class="det-value">${fmtDate(e.date)}</span></div>
      ${e.note ? `<div class="det-field"><span class="det-label">Note</span><span class="det-value">${e.note}</span></div>` : ''}
      <div class="det-field"><span class="det-label">File</span><span class="det-value" style="font-size:0.72rem;color:var(--muted)">${e.filename}</span></div>
    </div>`;
}

function renderDetailEdit(e) {
  const isImg = e.fileType && e.fileType.startsWith('image/');
  const previewHtml = e.fileData
    ? (isImg
        ? `<img class="det-preview" src="${e.fileData}" alt="${e.filename}" style="max-height:180px">`
        : `<div class="det-preview-pdf" style="height:80px">
             <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
             ${e.filename}
           </div>`)
    : '';

  // Build currency chips
  const knownCurs = ['PLN','EUR','GBP'];
  const curIsOther = !knownCurs.includes(e.currency);
  const curChips = knownCurs.map(c =>
    `<button class="chip${e.currency === c ? ' active' : ''}" data-ec="${c}">${c}</button>`).join('') +
    `<button class="chip${curIsOther ? ' active' : ''}" data-ec="other">Inna</button>`;

  // Build category chips
  const knownCats = ['transport','hotel','food','other'];
  const catIsOther = !knownCats.includes(e.category);
  const catChips = knownCats.map(k =>
    `<button class="chip${e.category === k ? ' active' : ''}" data-ek="${k}">${k}</button>`).join('') +
    (catIsOther ? `<button class="chip active" data-ek="${e.category}">${e.category}</button>` : '');

  document.getElementById('detail-body').innerHTML = `
    ${previewHtml}
    <div class="det-body" style="gap:12px">
      <div>
        <label class="flabel">Amount</label>
        <input type="number" class="finput" id="e-amount" value="${e.amount}" step="0.01" min="0" style="font-size:1.05rem;font-weight:700;">
      </div>
      <div>
        <label class="flabel">Currency</label>
        <div class="chips" id="e-cur-chips">${curChips}</div>
        <input type="text" class="finput" id="e-custom-cur" placeholder="e.g. USD…" maxlength="5" value="${curIsOther ? e.currency : ''}" style="display:${curIsOther ? '' : 'none'};margin-top:7px;">
      </div>
      <div>
        <label class="flabel">Category</label>
        <div class="chips" id="e-cat-chips">${catChips}</div>
        <input type="text" class="finput" id="e-custom-cat" placeholder="Enter…" value="${catIsOther ? e.category : ''}" style="display:${catIsOther ? '' : 'none'};margin-top:7px;">
      </div>
      <div>
        <label class="flabel">Note</label>
        <input type="text" class="finput" id="e-note" value="${e.note || ''}" placeholder="note…">
      </div>
      <div class="rate-info" id="e-rate-info">${e.eurAmount != null && e.currency !== 'EUR' ? `1 ${e.currency} = ${e.eurRate.toFixed(4)} EUR → <strong>${e.eurAmount.toFixed(2)} EUR</strong>` : e.currency === 'EUR' ? '1 EUR = 1 EUR' : ''}</div>
      <div class="det-actions">
        <button class="btn-primary" id="e-save" style="flex:1">Save changes</button>
      </div>
    </div>`;

  // Live EUR preview in edit
  let _editRateTimer;
  function scheduleEditRatePreview() {
    clearTimeout(_editRateTimer);
    _editRateTimer = setTimeout(async () => {
      const amt  = parseFloat(document.getElementById('e-amount')?.value);
      const chip = document.querySelector('#e-cur-chips .chip.active');
      const cur  = chip?.dataset.ec === 'other'
        ? document.getElementById('e-custom-cur')?.value.trim().toUpperCase()
        : chip?.dataset.ec;
      const info = document.getElementById('e-rate-info');
      if (!info || !amt || !cur) return;
      if (cur === 'EUR') { info.innerHTML = '1 EUR = 1.0000 EUR'; return; }
      info.textContent = 'Fetching rate…';
      const rate = await getEurRate(cur, null);
      if (rate) info.innerHTML = `1 ${cur} = ${rate.toFixed(4)} EUR → <strong>${(amt * rate).toFixed(2)} EUR</strong>`;
      else info.textContent = `Could not fetch rate for ${cur}`;
    }, 500);
  }
  document.getElementById('e-amount').addEventListener('input', scheduleEditRatePreview);

  // Currency chips
  document.getElementById('e-cur-chips').addEventListener('click', ev => {
    const chip = ev.target.closest('.chip'); if (!chip) return;
    document.querySelectorAll('#e-cur-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    document.getElementById('e-custom-cur').style.display = chip.dataset.ec === 'other' ? '' : 'none';
    scheduleEditRatePreview();
  });
  document.getElementById('e-custom-cur').addEventListener('input', scheduleEditRatePreview);

  // Category chips
  document.getElementById('e-cat-chips').addEventListener('click', ev => {
    const chip = ev.target.closest('.chip'); if (!chip) return;
    document.querySelectorAll('#e-cat-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    document.getElementById('e-custom-cat').style.display = !['transport','hotel','food','other'].includes(chip.dataset.ek) ? '' : 'none';
  });

  // Save
  document.getElementById('e-save').addEventListener('click', async () => {
    const amt = parseFloat(document.getElementById('e-amount').value);
    if (!amt || amt <= 0) { toast('Enter an amount'); return; }

    const activeCurChip  = document.querySelector('#e-cur-chips .chip.active');
    const activeCatChip  = document.querySelector('#e-cat-chips .chip.active');
    const currency = activeCurChip?.dataset.ec === 'other'
      ? (document.getElementById('e-custom-cur').value.trim().toUpperCase() || e.currency)
      : (activeCurChip?.dataset.ec || e.currency);
    const category = activeCatChip
      ? (['transport','hotel','food','other'].includes(activeCatChip.dataset.ek)
          ? activeCatChip.dataset.ek
          : (document.getElementById('e-custom-cat').value.trim() || activeCatChip.dataset.ek))
      : e.category;
    const note = document.getElementById('e-note').value.trim();

    const btn = document.getElementById('e-save');
    btn.disabled = true; btn.textContent = 'Calculating…';

    // Re-fetch rate only if currency changed
    let eurRate = e.eurRate, eurAmount = e.eurAmount;
    if (currency !== e.currency) {
      eurRate   = await getEurRate(currency, e.date);
      eurAmount = eurRate !== null ? parseFloat((amt * eurRate).toFixed(4)) : null;
    } else if (amt !== e.amount) {
      eurAmount = eurRate !== null ? parseFloat((amt * eurRate).toFixed(4)) : null;
    }

    const all = load();
    const idx = all.findIndex(x => x.id === detailId);
    if (idx !== -1) {
      all[idx] = { ...all[idx], amount: amt, currency, category, note, eurRate, eurAmount };
      save(all);
      render();
      detailMode = 'view';
      renderDetail();
      toast('Saved', 2200, 'success');
    }
  });
}
