<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EPKP Wind</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #07090f;
    --line: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #4d8ef5;
    --warn: #f5a623;
    --danger: #e84040;
    --green: #3ec87a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { min-height: 100%; background: #03040a; }

  body {
    font-family: var(--sans);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background: radial-gradient(ellipse 700px 900px at 50% 35%, #0b1020 0%, #03040a 100%);
  }

  .wrapper {
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  @media (min-width: 500px) {
    .wrapper {
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 40px 100px rgba(0,0,0,0.85);
    }
  }

  /* HEADER */
  .hdr {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .hdr-icao { font-family: var(--mono); font-size: 1.1rem; letter-spacing: .08em; }
  .hdr-sub  { font-size: 0.67rem; color: var(--muted); margin-top: 3px; font-family: var(--mono); }
  .hdr-right { text-align: right; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); line-height: 1.75; }
  .hdr-time  { color: var(--accent); }

  /* RUNWAY BAR */
  .rwy-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
  }
  .rwy-badge {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 4px; padding: 2px 8px;
    color: var(--text); font-size: 0.72rem;
  }
  .rwy-xw { margin-left: auto; }
  .xw-ok     { color: var(--green); }
  .xw-warn   { color: var(--warn); }
  .xw-danger { color: var(--danger); }

  /* BAND */
  .band {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--line);
    padding: 11px 14px 11px 16px;
    gap: 0 10px;
    min-height: 88px;
    position: relative;
    background: rgba(255,255,255,0.03);
    overflow: hidden;
    transition: background .12s;
  }
  .band:last-child { border-bottom: none; }
  .band:hover { background: rgba(255,255,255,.045); }

  /* Left accent stripe */
  .band::before {
    content: '';
    position: absolute;
    left: 0; top: 18%; bottom: 18%;
    width: 2px;
    background: var(--stripe, rgba(77,142,245,.35));
    border-radius: 0 1px 1px 0;
  }

  /* Alt label */
  .band-alt {
    width: 56px;
    flex-shrink: 0;
    font-family: var(--mono);
  }
  .band-ft  { font-size: 0.87rem; font-weight: 600; color: var(--text); line-height: 1; }
  .band-ft sup { font-size: 0.46rem; }
  .band-m   { font-size: 0.56rem; color: var(--muted); margin-top: 3px; }

  /* Isometric arrow area */
  .band-arrow {
    width: 62px;
    height: 62px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Disc platform under arrow */
  .band-arrow::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(255,255,255,.06);
  }

  /* Elliptical cast shadow */
  .band-arrow::after {
    content: '';
    position: absolute;
    bottom: 7px; left: 50%;
    transform: translateX(-50%);
    width: 26px; height: 5px;
    background: rgba(0,0,0,.55);
    border-radius: 50%;
    filter: blur(3px);
  }

  /* Right column: streaks + info */
  .band-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
    overflow: hidden;
  }

  .band-streaks {
    display: block;
    width: 100%;
    height: 44px;
    flex-shrink: 0;
    border-radius: 3px;
  }

  .band-info {
    display: flex;
    align-items: baseline;
    gap: 7px;
    font-family: var(--mono);
    flex-shrink: 0;
  }
  .band-kt  { font-size: 1.05rem; color: var(--text); }
  .band-kt small { font-size: 0.57rem; color: var(--muted); margin-left: 1px; }
  .band-dir { font-size: 0.63rem; color: var(--muted); }
  .band-kmh { font-size: 0.57rem; color: rgba(255,255,255,.18); }
  .band-xw  {
    margin-left: auto;
    text-align: right;
    font-size: 0.72rem;
    flex-shrink: 0;
  }
  .band-xw small { font-size: 0.5rem; color: var(--muted); display: block; margin-top: 1px; }

  .loading { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 0.85rem; font-family: var(--mono); }
  .error   {
    padding: 16px; margin: 12px 16px;
    background: rgba(232,64,64,.08);
    border: 1px solid rgba(232,64,64,.3);
    border-radius: 6px;
    font-size: 0.8rem; color: var(--danger); font-family: var(--mono);
  }

  .footer {
    padding: 12px 16px;
    font-size: 0.62rem; color: var(--muted);
    font-family: var(--mono);
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .refresh-btn {
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    color: var(--muted); font-family: var(--mono); font-size: 0.65rem;
    padding: 4px 10px; border-radius: 4px; cursor: pointer;
  }
  .refresh-btn:active { opacity: .7; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="hdr">
    <div>
      <div class="hdr-icao">EPKP</div>
      <div class="hdr-sub">KRAKÓW BALICE · 664ft AMSL</div>
    </div>
    <div class="hdr-right">
      <div id="hdr-time" class="hdr-time">——:——Z</div>
      <div id="hdr-qnh">QNH ——</div>
      <div id="hdr-temp">T ——°C</div>
    </div>
  </div>

  <div class="rwy-bar">
    <span class="rwy-badge">RWY 09/27</span>
    <span>hdg 090°/270°</span>
    <span class="rwy-xw" id="rwy-xw-label">XW: ——</span>
  </div>

  <div id="bands">
    <div class="loading">Ładowanie...</div>
  </div>

  <div class="footer">
    <span>Open-Meteo · 50.087°N 20.201°E</span>
    <button class="refresh-btn" onclick="loadData()">↻</button>
  </div>

</div>
<script>
const LAT = 50.087, LON = 20.201, ELEV_FT = 664;
const RWY = 270;

const LVLS = [
  { m: 180, ws: 'windspeed_180m', wd: 'winddirection_180m' },
  { m: 120, ws: 'windspeed_120m', wd: 'winddirection_120m' },
  { m:  80, ws: 'windspeed_80m',  wd: 'winddirection_80m'  },
  { m:  10, ws: 'windspeed_10m',  wd: 'winddirection_10m'  },
];

function ftMSL(m)    { return Math.round(ELEV_FT + m * 3.281); }
function toKt(kmh)   { return kmh * 0.5399; }
function dirName(d) {
  const n = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return n[Math.round(((d % 360) + 360) % 360 / 22.5) % 16];
}
function crosswind(kt, dir) {
  const a = ((dir - RWY) % 360 + 360) % 360;
  const rel = a > 180 ? 360 - a : a;
  return Math.abs(Math.round(kt * Math.sin(rel * Math.PI / 180)));
}

/* ---- Isometric arrow SVG ---- */
/*
  Arrow tip points FROM windDir (meteorological convention).
  SVG has tip at top (0 deg = North), rotated by windDir degrees via CSS.
  perspective(180px) rotateX(54deg) gives the 2.5D isometric tilt.
  rotateZ(windDir) sets the direction.
*/
function isoArrowSVG(windDir, color, idx) {
  const gid = 'ag' + idx;
  const tx  = `perspective(180px) rotateX(54deg) rotateZ(${windDir}deg)`;
  return `<svg viewBox="-18 -24 36 42" width="52" height="52" overflow="visible"
      style="position:relative;z-index:1;transform:${tx};">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="${color}" stop-opacity="1"/>
        <stop offset="100%" stop-color="${color}" stop-opacity=".62"/>
      </linearGradient>
    </defs>
    <!-- depth/shadow copy (offset) -->
    <polygon points="0,-22 -12,-5 12,-5"
      fill="${color}" opacity=".18" transform="translate(2,3)"/>
    <rect x="-5" y="-5" width="10" height="18" rx="1.5"
      fill="${color}" opacity=".18" transform="translate(2,3)"/>
    <!-- main face -->
    <polygon points="0,-22 -12,-5 12,-5" fill="url(#${gid})"/>
    <rect x="-5" y="-5" width="10" height="18" rx="1.5" fill="url(#${gid})"/>
    <!-- lit-side highlight (left edge of head + shaft) -->
    <polygon points="0,-22 -12,-5 -5,-5 -5,13" fill="rgba(255,255,255,.21)"/>
    <!-- tip shine -->
    <circle cx="0" cy="-21" r="1.4" fill="rgba(255,255,255,.5)"/>
  </svg>`;
}

/* ---- Streak particle animation ---- */
let activeStreaks = [];

function stopAllStreaks() {
  activeStreaks.forEach(s => s.stop());
  activeStreaks = [];
}

class StreakAnim {
  constructor(canvas, windDir, windKt) {
    this.canvas  = canvas;
    this.ctx     = canvas.getContext('2d');
    this.windDir = windDir;
    this.windKt  = windKt;
    this.alive   = true;
    this.raf     = null;
    this._setup();
  }

  _setup() {
    const dpr = window.devicePixelRatio || 1;
    const W = this.canvas.clientWidth  || 200;
    const H = this.canvas.clientHeight || 44;
    this.canvas.width  = W * dpr;
    this.canvas.height = H * dpr;
    this.ctx.scale(dpr, dpr);
    this.W = W; this.H = H;

    // velocity direction: wind blows TO (windDir + 180)
    const toRad = ((this.windDir + 180) % 360) * Math.PI / 180;
    this.vx = Math.sin(toRad);
    this.vy = -Math.cos(toRad);   // canvas y increases downward

    this.speed = Math.max(0.35, this.windKt * 0.13);

    const N = Math.max(8, Math.floor(W / 17));
    this.particles = Array.from({ length: N }, (_, i) => ({
      x:     Math.random() * W,
      y:     Math.random() * H,
      len:   7 + Math.random() * 13,
      alpha: 0.10 + Math.random() * 0.28,
      lw:    0.7  + Math.random() * 0.9,
    }));
  }

  _tick() {
    if (!this.alive) return;
    this._update();
    this._draw();
    this.raf = requestAnimationFrame(() => this._tick());
  }

  _update() {
    const { vx, vy, speed, W, H } = this;
    const pad = 35;
    this.particles.forEach(p => {
      p.x += vx * speed;
      p.y += vy * speed;
      if      (p.x < -pad)    p.x += W + pad * 2;
      else if (p.x > W + pad) p.x -= W + pad * 2;
      if      (p.y < -pad)    p.y += H + pad * 2;
      else if (p.y > H + pad) p.y -= H + pad * 2;
    });
  }

  _draw() {
    const { ctx, vx, vy, W, H } = this;
    ctx.clearRect(0, 0, W, H);

    this.particles.forEach(p => {
      const tx = p.x - vx * p.len;
      const ty = p.y - vy * p.len;

      const g = ctx.createLinearGradient(tx, ty, p.x, p.y);
      g.addColorStop(0,   `rgba(255,255,255,0)`);
      g.addColorStop(0.4, `rgba(255,255,255,${p.alpha * 0.5})`);
      g.addColorStop(1,   `rgba(255,255,255,${p.alpha})`);

      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = g;
      ctx.lineWidth   = p.lw;
      ctx.lineCap     = 'round';
      ctx.stroke();
    });
  }

  start() { this._tick(); }
  stop()  { this.alive = false; if (this.raf) cancelAnimationFrame(this.raf); }
}

/* ---- Data fetch & render ---- */
async function loadData() {
  const bandsEl = document.getElementById('bands');
  bandsEl.innerHTML = '<div class="loading">Ładowanie danych...</div>';
  stopAllStreaks();

  const today = new Date().toISOString().slice(0, 10);
  const fields = [
    'pressure_msl','temperature_2m',
    'windspeed_10m','windspeed_80m','windspeed_120m','windspeed_180m',
    'winddirection_10m','winddirection_80m','winddirection_120m','winddirection_180m',
  ].join(',');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=${fields}&start_date=${today}&end_date=${today}&timezone=UTC`;

  try {
    const res  = await fetch(url);
    const data = await res.json();
    const h    = data.hourly;
    const utcH = new Date().getUTCHours();
    let idx = h.time.findIndex(t => t.endsWith(`T${String(utcH).padStart(2,'0')}:00`));
    if (idx < 0) idx = 0;

    const qnh  = h.pressure_msl[idx];
    const temp = h.temperature_2m[idx];
    document.getElementById('hdr-time').textContent =
      h.time[idx].slice(11, 16) + 'Z';
    document.getElementById('hdr-qnh').textContent =
      qnh  ? `QNH ${Math.round(qnh)} hPa` : 'QNH —';
    document.getElementById('hdr-temp').textContent =
      temp != null ? `T ${temp.toFixed(1)}°C` : '';

    const bandData = [];
    let surfXW = 0;
    let html = '';

    LVLS.forEach((lv, i) => {
      const spd_kmh = h[lv.ws][idx] || 0;
      const dir     = h[lv.wd][idx] || 0;
      const ft      = ftMSL(lv.m);
      const kt      = toKt(spd_kmh);
      const xw      = crosswind(kt, dir);
      if (lv.m === 10) surfXW = xw;

      bandData.push({ dir, kt });

      let color, xwCls, stripe;
      if      (xw >= 15) { color = '#e84040'; xwCls = 'xw-danger'; stripe = 'rgba(232,64,64,.4)'; }
      else if (xw >= 10) { color = '#f5a623'; xwCls = 'xw-warn';   stripe = 'rgba(245,166,35,.38)'; }
      else               { color = '#4d8ef5'; xwCls = 'xw-ok';     stripe = 'rgba(77,142,245,.32)'; }

      html += `
      <div class="band" style="--stripe:${stripe}">
        <div class="band-alt">
          <div class="band-ft">${ft}<sup>ft</sup></div>
          <div class="band-m">${lv.m}m AGL</div>
        </div>
        <div class="band-arrow">
          ${isoArrowSVG(dir, color, i)}
        </div>
        <div class="band-right">
          <canvas class="band-streaks" data-idx="${i}"></canvas>
          <div class="band-info">
            <span class="band-kt">${kt.toFixed(0)}<small>kt</small></span>
            <span class="band-dir">${dir}° ${dirName(dir)}</span>
            <span class="band-kmh">${spd_kmh.toFixed(1)}km/h</span>
            <div class="band-xw">
              <span class="${xwCls}">${xw}kt</span>
              <small>XW</small>
            </div>
          </div>
        </div>
      </div>`;
    });

    bandsEl.innerHTML = html;

    const xwEl = document.getElementById('rwy-xw-label');
    xwEl.textContent = `XW: ${surfXW}kt`;
    xwEl.className   = 'rwy-xw ' +
      (surfXW >= 15 ? 'xw-danger' : surfXW >= 10 ? 'xw-warn' : 'xw-ok');

    // Start streaks after layout is complete (double rAF ensures paint)
    requestAnimationFrame(() => requestAnimationFrame(() => {
      bandsEl.querySelectorAll('.band-streaks').forEach(canvas => {
        const i = +canvas.dataset.idx;
        const { dir, kt } = bandData[i];
        const s = new StreakAnim(canvas, dir, kt);
        s.start();
        activeStreaks.push(s);
      });
    }));

  } catch (e) {
    stopAllStreaks();
    bandsEl.innerHTML = `<div class="error">Błąd: ${e.message}</div>`;
  }
}

loadData();
setInterval(loadData, 30 * 60 * 1000);
</script>
</body>
</html>
