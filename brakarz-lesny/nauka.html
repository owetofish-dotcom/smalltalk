<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nauka - BrakarzLesny</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <a href="index.html">&#8592; BrakarzLesny</a>
  <h1>Nauka - fiszki</h1>
</div>
<div class="fiszka-nav">
  <button class="btn btn-secondary btn-sm" onclick="prev()">&#8592;</button>
  <span class="fiszka-counter" id="counter">1 / 1</span>
  <button class="btn btn-secondary btn-sm" onclick="next()">&#8594;</button>
</div>
<div class="fiszka-wrap">
  <div class="fiszka" id="fiszka" onclick="flip()">
    <div class="side-label" id="side-label">PYTANIE</div>
    <div class="content" id="fiszka-content">Ladowanie...</div>
    <div class="flip-hint" style="font-size:.72rem;color:#bbb;margin-top:8px">Kliknij aby odwrocic</div>
  </div>
</div>
<script src="theory-lesny.js"></script>
<script>
let cards=[], idx=0, flipped=false;
THEORY_LESNY.forEach(m=>(m.sections||[]).forEach(s=>cards.push({q:s.heading,a:s.body})));
function render(){
  flipped=false;
  document.getElementById('side-label').textContent='PYTANIE';
  document.getElementById('fiszka-content').textContent=cards[idx]?cards[idx].q:'';
  document.getElementById('counter').textContent=(idx+1)+' / '+cards.length;
}
function flip(){
  flipped=!flipped;
  document.getElementById('side-label').textContent=flipped?'ODPOWIEDZ':'PYTANIE';
  document.getElementById('fiszka-content').textContent=flipped?(cards[idx]?cards[idx].a:''):(cards[idx]?cards[idx].q:'');
}
function prev(){idx=Math.max(0,idx-1);render();}
function next(){idx=Math.min(cards.length-1,idx+1);render();}
render();
</script>
</body>
</html>
